name: Monitor de Concursos DPU/DPE

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: {}

jobs:
  verificar-concursos:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Preencher config.json com os segredos do repositório
        run: |
          python3 - <<'EOF'
          import json
          with open('config.json') as f:
              cfg = json.load(f)
          import os
          cfg['notificacao']['telefone_destino'] = os.environ['TELEFONE_DESTINO']
          cfg['notificacao']['callmebot_apikey'] = os.environ['CALLMEBOT_APIKEY']
          with open('config.json', 'w') as f:
              json.dump(cfg, f, ensure_ascii=False, indent=2)
          EOF
        env:
          TELEFONE_DESTINO: ${{ secrets.TELEFONE_DESTINO }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}

      - name: Rodar o monitor
        run: python3 monitor.py

      - name: Salvar o novo estado (state.json) de volta no repositório
        run: |
          git config user.name "monitor-bot"
          git config user.email "monitor-bot@users.noreply.github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "Atualiza estado do monitoramento"
          git push
