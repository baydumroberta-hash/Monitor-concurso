name: Monitor de Concursos DPU/DPE

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: {}

jobs:
  verificar-concursos:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Preencher config.json com os segredos do repositório
        run: |
          python3 - <<'EOF'
          import json
          import os

          with open('config.json') as f:
              cfg = json.load(f)

          destinatarios = []
          i = 1
          while True:
              telefone = os.environ.get(f'TELEFONE_DESTINO_{i}')
              apikey = os.environ.get(f'CALLMEBOT_APIKEY_{i}')
              if not telefone or not apikey:
                  break
              destinatarios.append({"telefone": telefone, "callmebot_apikey": apikey})
              i += 1

          cfg['notificacao']['destinatarios'] = destinatarios

          with open('config.json', 'w') as f:
              json.dump(cfg, f, ensure_ascii=False, indent=2)
          EOF
        env:
          TELEFONE_DESTINO_1: ${{ secrets.TELEFONE_DESTINO_1 }}
          CALLMEBOT_APIKEY_1: ${{ secrets.CALLMEBOT_APIKEY_1 }}
          TELEFONE_DESTINO_2: ${{ secrets.TELEFONE_DESTINO_2 }}
          CALLMEBOT_APIKEY_2: ${{ secrets.CALLMEBOT_APIKEY_2 }}

      - name: Rodar o monitor
        run: python3 monitor.py

      - name: Salvar o novo estado (state.json) de volta no repositório
        run: |
          git config user.name "monitor-bot"
          git config user.email "monitor-bot@users.noreply.github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "Atualiza estado do monitoramento"
          git push
